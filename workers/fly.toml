# fly.toml app configuration file generated for merlin-tick-worker on 2026-04-22T17:47:28+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'merlin-tick-worker'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'info'
  POLL_INTERVAL_MS = '10000'
  PORT = '3000'
  TRIGGER_COOLDOWN_MS = '1500'
  FULL_RUN_INTERVAL_MS = '60000'
  # Voor Merlijn full-run (opens) — set met:
  #   fly secrets set PAPER_ENGINE_SECRET=<value uit Vercel env>
  # Zonder deze secret: alleen Kronos opens via worker; Merlijn opens via cron.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
